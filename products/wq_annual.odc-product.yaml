---
name: wq_annual
description: >
  DE Africa Water Quality Service annual water quality variables at 10m
  resolution - version 1.
metadata_type: eo3
license: CC-BY-4.0

load:
  crs: EPSG:6933
  resolution:
    x: 10
    y: -10

metadata:
  product_name: wq_annual

measurements:
  - name: agm_fai
    aliases:
      - fai
      - FAI
      - floating_algae_index
    dtype: float32
    nodata: NaN
    units: "1"
    scale_factor: 1.0
    add_offset: 0.0
  - name: agm_hue
    aliases:
      - hue
      - HUE
    dtype: float32
    nodata: NaN
    units: "degrees"
    scale_factor: 1.0
    add_offset: 0.0
  - name: agm_ndvi
    aliases:
      - ndvi
      - NDVI
    dtype: float32
    nodata: NaN
    units: "1"
    scale_factor: 1.0
    add_offset: 0.0
  - name: agm_owt
    aliases:
      - owt
      - OWT
      - optical_water_type
    dtype: float32
    nodata: NaN
    units: "1"
    scale_factor: 1.0
    add_offset: 0.0
    flags_definition:
      values:
        1: eutrophic_and_blue_green
        2: eutrophic_and_blue_green
        3: oligotrophic_clear
        4: eutrophic_and_blue_green
        5: eutrophic_and_blue_green
        6: hyper_eutrophic_green_brown
        7: hyper_eutrophic_green_brown
        8: hyper_eutrophic_green_brown
        9: oligotrophic_clear
        10: hyper_eutrophic_green_brown
        11: eutrophic_and_blue_green
        12: eutrophic_and_blue_green
        13: oligotrophic_clear
      description: optical water type classes
  - name: chla
    aliases:
      - CHLA
      - chlorophyll_a
    dtype: float32
    nodata: NaN
    units: "1"
    scale_factor: 1.0
    add_offset: 0.0
  - name: clear_water
    dtype: float32
    nodata: NaN
    units: "1"
    scale_factor: 1.0
    add_offset: 0.0
  - name: tirs_st_ann_max
    aliases:
      - st_max
      - max_surface_temperature
    dtype: float32
    nodata: NaN
    units: 'degrees Celsius'
    scale_factor: 1.0
    add_offset: 0.0
  - name: tirs_st_ann_med
    aliases:
      - st_median
      - median_surface_temperature
    dtype: float32
    nodata: NaN
    units: 'degrees Celsius'
    scale_factor: 1.0
    add_offset: 0.0
  - name: tirs_st_ann_min
    aliases:
      - st_min
      - min_surface_temperature
    dtype: float32
    nodata: NaN
    units: 'degrees Celsius'
    scale_factor: 1.0
    add_offset: 0.0
  - name: tsi
    aliases:
      - TSI
      - trophic_state_index
    dtype: float32
    nodata: NaN
    units: "1"
    scale_factor: 1.0
    add_offset: 0.0
  - name: tsm
    aliases:
      - TSM
      - total_suspended_matter
    dtype: float32
    nodata: NaN
    units: "1"
    scale_factor: 1.0
    add_offset: 0.0
  - name: water_mask
    dtype: float32
    nodata: NaN
    units: "1"
    scale_factor: 1.0
    add_offset: 0.0
